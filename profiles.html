    <h1>Add Your Skill Profile</h1>

    <!-- FORM -->
    <div class="form-box">
      <input type="text" id="name" placeholder="Your Name">
      <input type="text" id="teach" placeholder="Skills You Can Teach">
      <input type="text" id="learn" placeholder="Skills You Want to Learn">

      <button onclick="addProfile()">Add Profile</button>
    </div>

    <h3 id="profileCount">Total Profiles:0</h3>
    <!-- SEARCH -->
    <input type="text" id="search" placeholder="Search Skill..." onkeyup="searchProfile()">

    <p id="noResult" style="display:none;">
   No matching skills found 😔 <br>
   Try searching for another skill.

</p>

    <div id="matchResult"></div>

    <!-- CARDS -->
    <div id="profileContainer" class="card-container"></div>
